    <div class="top-controls">

    </div>

    <div class="display-section">
        <div class="channel-panel">
            <div class="vu-meter">
                <div class="vu-scale-container" id="scaleLeft"></div>

                <div class="vu-label">V&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;U</div>

            <div class="eq-display" id="eqLeft"><div class="eq-ref-0db"></div><div class="eq-ref-text-0db">0</div></div>

            <div class="vu-meter">
                <div class="vu-scale-container" id="scaleRight"></div>
                <div class="vu-needle" id="needleRight"></div>

            </div>
            <div class="eq-display" id="eqRight"><div class="eq-ref-0db"></div><div class="eq-ref-text-0db">0</div></div>
        </div>
    </div>

    <div class="transport-section">
        <div class="control-group" style="flex-direction: column; font-size:11px; gap:8px;">
            <span>STOP</span><button class="btn-transport btn-stop" id="btnStop"><div class="stop-square"></div></button>
        </div>
        <div class="control-group" style="flex-direction: column; font-size:11px; gap:8px;">
            <span>PREV</span><button class="btn-transport btn-prev" id="btnPrev">|◀</button>
        </div>
        <div class="control-group" style="flex-direction: column; font-size:11px; gap:8px;">
            <span>NEXT</span><button class="btn-transport btn-next" id="btnNext">▶|</button>
        </div>
        <div class="control-group" style="flex-direction: column; font-size:11px; gap:8px;">
            <span>LOOP</span><button class="btn-transport btn-loop" id="btnLoop">↻</button>
        </div>
        <div class="control-group" style="flex-direction: column; font-size:11px; gap:8px;">
            <span>PLAY / PAUSE</span><button class="btn-transport btn-play" id="btnPlay">▶||</button>
        </div>
        <div class="volume-control">

        </div>
    </div>

    <div class="tube-engine-title">VACUUM TUBE AMPLIFIER SIMULATOR v2.2 (Pure Tube Engine)</div>

        <button class="tube-btn active" data-tube="BYPASS" style="background: linear-gradient(180deg, #2E8B57, #006400); --btn-color: #2E8B57;" data-desc="Clean, flat reference sound with no coloration.">BYPASS</button>
        <button class="tube-btn" data-tube="300B" style="background: linear-gradient(180deg, #DAA520, #8B6508); --btn-color: #DAA520;" data-desc="Direct-heated triode 300B. Strong 2nd harmonics highlight vocal breath and string instrument gloss.">300B</button>
        <button class="tube-btn" data-tube="2A3" style="background: linear-gradient(180deg, #4682B4, #27408B); --btn-color: #4682B4;" data-desc="Extreme delicacy 2A3. Captures brilliant ultra-high frequencies with extreme resolution.">2A3</button>
        <button class="tube-btn" data-tube="45" style="background: linear-gradient(180deg, #8B8378, #544F49); --btn-color: #8B8378;" data-desc="Rustic vintage 45. Creates a comfortable tone with an unexaggerated, clean harmonic structure.">45</button>
        <button class="tube-btn" data-tube="EL34" style="background: linear-gradient(180deg, #CD6600, #8B4500); --btn-color: #CD6600;" data-desc="British sound EL34. Strong 3rd harmonics provide a solid midrange and crunch.">EL34</button>
        <button class="tube-btn" data-tube="KT66" style="background: linear-gradient(180deg, #6B8E23, #458B00); --btn-color: #6B8E23;" data-desc="Rich stage KT66. Harmonious 2nd and 4th harmonics beautifully fill the spatial stage.">KT66</button>
        <button class="tube-btn" data-tube="KT88" style="background: linear-gradient(180deg, #B22222, #8B1A1A); --btn-color: #B22222;" data-desc="Powerful driving force KT88. Boasts a heavy dynamic range without losing its grandeur.">KT88</button>
        <button class="tube-btn" data-tube="6550" style="background: linear-gradient(180deg, #483D8B, #2F4F4F); --btn-color: #483D8B;" data-desc="American sound 6550. Features tightness and punch by tightly controlling higher-order harmonics.">6550</button>

    <div class="copyright">Copyright &copy; 2026 LeeSoundLab. All rights reserved.</div>
</div>
